name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── Run tests first ─────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test dependencies
        run: pip install pdfplumber pytest

      - name: Python tests
        run: python -m pytest backend/tests/ -v --tb=short

      - name: Swift tests
        run: |
          xcodebuild test \
            -project TableRead.xcodeproj \
            -scheme TableRead \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # ── Build release artifacts ─────────────────────────────────────────────────
  build:
    name: Build release
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v4

      # Restore cached embedded Python (keyed on the version + platform).
      # Cache key matches embed_python.sh's PYTHON_VERSION / PBS_TAG pins.
      - name: Restore embedded Python cache
        id: python-cache
        uses: actions/cache@v4
        with:
          path: vendor/python
          key: vendor-python-3.12.13-20260510-arm64

      - name: Download embedded Python (cache miss)
        if: steps.python-cache.outputs.cache-hit != 'true'
        run: bash scripts/embed_python.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release (ad-hoc signed)
        run: bash scripts/build_release.sh
        # Ad-hoc signing — no Developer ID required. Users see a one-time
        # Gatekeeper prompt on first launch. To enable full Developer ID
        # notarization: add DEVELOPER_ID and TEAM_ID as repository secrets
        # and change the build_release.sh call to include --notarize.

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: TableRead-${{ steps.version.outputs.version }}-dmg
          path: build/TableRead.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: TableRead-${{ steps.version.outputs.version }}-zip
          path: build/TableRead.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload SHA256
        uses: actions/upload-artifact@v4
        with:
          name: TableRead-${{ steps.version.outputs.version }}-sha256
          path: build/TableRead.sha256
          if-no-files-found: error
          retention-days: 7

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "artifacts/TableRead-${{ steps.version.outputs.version }}-dmg/TableRead.dmg#TableRead.dmg" \
            "artifacts/TableRead-${{ steps.version.outputs.version }}-zip/TableRead.zip#TableRead.zip" \
            "artifacts/TableRead-${{ steps.version.outputs.version }}-sha256/TableRead.sha256#TableRead.sha256" \
            --title "Table Read Beta v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest \
            --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
